            padding: 0;

        }

            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #1A2B5F 0%, #0A7A72 100%);
            color: white;
            padding: 40px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 12px rgba(26, 43, 95, 0.15);
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.95;
            font-weight: 300;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            border: 2px solid #C9960C;
            background: white;
            color: #1A2B5F;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95em;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab-btn:hover {
            background: #FFF8E7;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #C9960C;
            color: white;
            box-shadow: 0 4px 8px rgba(201, 150, 12, 0.3);
        }

        /* Content Area */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            gap: 16px;
        }

        /* Card */
        .dimension-card {
            background: white;
            border: 2px solid #0A7A72;
            border-radius: 8px;
            padding: 0;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        .dimension-card:hover {
            border-color: #C9960C;
            box-shadow: 0 4px 12px rgba(201, 150, 12, 0.2);
            transform: translateY(-2px);
        }

        .dimension-card.expanded {
            border-color: #C9960C;
            background: #FFF8E7;
        }

        .card-header {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #E8E8E8;
        }

        .card-header.expanded {
            border-bottom-color: #C9960C;
        }

        .dimension-num {
            font-weight: 700;
            color: #C9960C;
            margin-right: 12px;
            min-width: 50px;
        }

        .dimension-title {
            font-weight: 600;
            font-size: 1.05em;
            flex: 1;
        }

        .expand-icon {
            font-size: 1.5em;
            color: #0A7A72;
            transition: transform 0.3s ease;
        }

        .dimension-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .dimension-card.expanded .card-content {
            max-height: 800px;
        }

        .comparison-box {
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .side-column {
            padding: 16px;
            border-radius: 6px;
        }

        .left-side {
            background: #F0F8F7;
            border-left: 4px solid #C94444;
        }

        .right-side {
            background: #F8F4E6;
            border-left: 4px solid #1A7A6B;
        }

        .identity-name {
            font-weight: 700;
            font-size: 1.1em;
            margin-bottom: 12px;
            color: #1A2B5F;
        }

        .dimension-text {
            margin-bottom: 10px;
            line-height: 1.7;
            font-size: 1em;
        }

        .english-text {
            font-size: 0.9em;
            color: #666;
            font-style: italic;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        /* TTS Button */
        .tts-btn {
            background: #0A7A72;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            margin-top: 8px;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .tts-btn:hover {
            background: #1A5F55;
            transform: scale(1.05);
        }

        .tts-btn.playing {
            background: #C9960C;
            animation: pulse 0.6s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Summary Box */
        .summary-box {
            background: linear-gradient(135deg, #F8F4E6 0%, #F0F8F7 100%);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #C9960C;
            margin-bottom: 20px;
            font-size: 1em;
            line-height: 1.8;
        }

        .summary-title {
            font-weight: 700;
            color: #1A2B5F;
            margin-bottom: 12px;
            font-size: 1.15em;
        }

        /* Formula Box */
        .formula-box {
            background: #1A2B5F;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95em;
            line-height: 2.2;
            font-weight: 500;
        }

        .formula-box .arrow {
            color: #C9960C;
            margin: 0 6px;
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1A2B5F 0%, #0A7A72 100%);
            color: white;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
            color: #C9960C;
        }

        .stat-label {
            font-size: 0.95em;
            margin-top: 6px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .comparison-box {
                grid-template-columns: 1fr;
            }

            .dimension-card.expanded .card-content {
                max-height: 1200px;
            }
        }
    </style>
</head>

        const allSystems = [...identitySystems, ...additionalSystems];

        // 建立卡片
        function createCard(system, dimension) {
            const card = document.createElement('div');
            card.className = 'dimension-card';

            const summaryBox = dimension === system.dimensions[0] && system.summary ? 
                `<div class="summary-box">
                    <div class="summary-title">💡 核心智慧</div>
                    <p>${system.summary}</p>
                </div>` : '';

            const formulaBox = dimension === system.dimensions[0] && system.formula ?
                `<div class="formula-box">
                    ${system.formula.map((f, i) => `
                        <div>${i === 0 ? '🔴' : '🟢'} <strong>${f.label}</strong></div>
                        <div style="margin-left: 20px; margin-bottom: 12px;">${f.steps.join(' <span class="arrow">→</span> ')}</div>
                    `).join('')}
                </div>` : '';

            card.innerHTML = `
                ${summaryBox}
                ${formulaBox}
                <div class="card-header">
                    <span class="dimension-num">#${dimension.num}</span>
                    <span class="dimension-title">${dimension.zh}</span>
                    <span class="expand-icon">▼</span>
                </div>
                <div class="card-content">
                    <div class="comparison-box">
                        <div class="side-column left-side">
                            <div class="identity-name">${system.left_name}</div>
                            <div class="identity-name" style="font-size: 0.85em; color: #666; font-weight: 400;">${system.left_name_en}</div>
                            <div class="dimension-text">${dimension.zh_left}</div>
                            <div class="english-text">${dimension.en_left}</div>
                            <button class="tts-btn" onclick="speakEnglish('${escapeQuotes(dimension.en_left)}', event)">🔊 Speak English</button>
                        </div>
                        <div class="side-column right-side">
                            <div class="identity-name">${system.right_name}</div>
                            <div class="identity-name" style="font-size: 0.85em; color: #666; font-weight: 400;">${system.right_name_en}</div>
                            <div class="dimension-text">${dimension.zh_right}</div>
                            <div class="english-text">${dimension.en_right}</div>
                            <button class="tts-btn" onclick="speakEnglish('${escapeQuotes(dimension.en_right)}', event)">🔊 Speak English</button>
                        </div>
                    </div>
                </div>
            `;

            card.addEventListener('click', function(e) {
                if (!e.target.classList.contains('tts-btn')) {
                    this.classList.toggle('expanded');
                    const header = this.querySelector('.card-header');
                    header.classList.toggle('expanded');
                }
            });

            return card;
        }

        // 反轉義引號
        function escapeQuotes(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        // TTS函數
        function speakEnglish(text, event) {
            event.stopPropagation();
            
            const button = event.target;
            
            // 停止任何正在進行的語音
            window.speechSynthesis.cancel();
            
            // 移除所有播放狀態
            document.querySelectorAll('.tts-btn.playing').forEach(btn => {
                btn.classList.remove('playing');
            });

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1;
            utterance.volume = 1;

            button.classList.add('playing');

            utterance.onend = function() {
                button.classList.remove('playing');
            };

            utterance.onerror = function(e) {
                console.error('TTS error:', e);
                button.classList.remove('playing');
            };

            window.speechSynthesis.speak(utterance);
        }

        // 切換標籤
        function switchTab(tabIndex) {
            // 隱藏所有標籤
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // 移除所有按鈕的活躍狀態
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 顯示選中的標籤
            const selectedTab = document.getElementById(`tab${tabIndex}`);
            selectedTab.classList.add('active');
            document.querySelectorAll('.tab-btn')[tabIndex].classList.add('active');

            // 載入卡片
            if (selectedTab.children.length === 0) {
                const system = allSystems[tabIndex];
                const grid = document.createElement('div');
                grid.className = 'card-grid';

                system.dimensions.forEach(dimension => {
                    grid.appendChild(createCard(system, dimension));
                });

                selectedTab.appendChild(grid);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            switchTab(0);
        });
