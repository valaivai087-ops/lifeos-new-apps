                                <div class="lang-label">English</div>
                                <p>${book.oneSentence_en}</p>
                                <button class="sound-btn" onclick="speak('${book.oneSentence_en.replace(/'/g, "\\'")}')">🔊 發音</button>
                            </div>
                        </div>

                        <div class="content-section">
                            <span class="section-label">本質意義 | Essence</span>
                            <div class="bilingual-block">
                                <div class="lang-label">中文</div>
                                <p>${book.essence_zh}</p>
                            </div>
                            <div class="bilingual-block">
                                <div class="lang-label">English</div>
                                <p>${book.essence_en}</p>
                                <button class="sound-btn" onclick="speak('${book.essence_en.replace(/'/g, "\\'")}')">🔊 發音</button>
                            </div>
                        </div>

                        <div class="content-section">
                            <span class="section-label">章節概覽 | Chapter Overview</span>
                            <div class="bilingual-block">
                                <div class="lang-label">中文</div>
                                <p>${book.chapters_zh}</p>
                            </div>
                            <div class="bilingual-block">
                                <div class="lang-label">English</div>
                                <p>${book.chapters_en}</p>
                            </div>
                        </div>

                        <div class="content-section">
                            <span class="section-label">聖經金句 | Key Verses (5句)</span>
                            ${book.verses.map((v, i) => `
                                <div class="verse-item">
                                    <p><strong>金句 ${i+1}：</strong>${v.zh}</p>
                                    <p><strong>English:</strong> ${v.en}</p>
                                    <button class="verse-btn" onclick="speak('${v.en.replace(/'/g, "\\'")}')">🔊 發音</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderStages() {
            const container = document.getElementById('stagesContainer');
            container.innerHTML = stagesData.map(stage => `
                <div class="step" onclick="toggleStage(${stage.num})">
                    <div class="step-num">${stage.num}</div>
                    <div class="step-content">
                        <h3>${stage.zh} | ${stage.en}</h3>
                        <p>${stage.book}</p>
                    </div>
                    <div class="step-detail">
                        <p><strong>中文：</strong>${stage.desc_zh}</p>
                        <p style="margin-top: 8px;"><strong>English：</strong>${stage.desc_en}</p>
                        <button class="sound-btn" onclick="speak('${stage.desc_en.replace(/'/g, "\\'")}');" style="width: 100%; margin-top: 10px;">🔊 發音英文</button>
                    </div>
                </div>
            `).join('');
        }

        function renderFormulas() {
            const container = document.getElementById('formulasContainer');
            container.innerHTML = `
                <div class="formula-box">
                    <p><strong>30秒記住新約公式：</strong></p>
                    <p>約翰(身份) → 馬太(思維) → 馬可(行動) → 路加(關係) → 使徒(使命) → 書信(成熟) → 啟示錄(永恆)</p>
                    <button class="sound-btn" onclick="speak('John identity, Matthew mindset, Mark action, Luke relationship, Acts mission, Paul maturity, Revelation eternity')" style="width: 100%;">🔊 發音英文公式</button>
                </div>
                <div class="formula-box">
                    <p><strong>新約分類：</strong></p>
                    <p>📖 四福音（4卷）| 🏃 使徒行傳（1卷）| 📜 保羅書信（14卷）| ✍️ 其他書信（7卷）| 🔮 啟示錄（1卷）</p>
                </div>
            `;
        }

        function renderTable() {
            const container = document.getElementById('tableContainer');
            let html = '<table><thead><tr><th>卷</th><th>書名</th><th>英文</th><th>關鍵字</th><th>金句</th></tr></thead><tbody>';
            booksData.forEach(book => {
                html += `<tr><td>${book.num}</td><td><strong>${book.zh}</strong></td><td>${book.en}</td><td>${book.keyword}</td><td>5</td></tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function toggleBook(num) {
            const card = document.getElementById('book-' + num);
            if (card) card.classList.toggle('open');
        }

        function toggleStage(num) {
            const steps = document.querySelectorAll('.step');
            if (steps[num-1]) steps[num-1].classList.toggle('open');
        }

        function switchTab(e, tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.add('active');
            e.target.classList.add('active');
        }

        function speak(text) {
            if (!text) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            utterance.pitch = 1.0;
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }

        renderBooks();
        renderStages();
        renderFormulas();
        renderTable();
    </script>
</body>
</html>
