    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", "Segoe UI", sans-serif;
            background: white;
            color: #333;
            line-height: 1.6;
        }

        :root {
            --navy: #1A2B5F;
            --gold: #C9960C;
            --teal: #0A7A72;
            --light: #F8F7F6;
            --border: #E8E6E3;
            --gray: #666;
        }

        header {
            background: linear-gradient(135deg, var(--navy) 0%, #0F1C3F 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1rem;
            opacity: 0.95;
            margin: 0.5rem 0;
        }

        .formula-section {
            background: var(--light);
            padding: 3rem 2rem;
            border-bottom: 2px solid var(--gold);
        }

        .formula-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .formula-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 6px;
            padding: 1.5rem;
            text-align: center;
        }

        .formula-card .label { 
            font-size: 0.8rem;
            color: var(--teal);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .formula-card .value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--navy);
        }

        .main-section {
            max-width: 1400px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 0.5rem;
        }

        .section-subtitle {
            text-align: center;
            font-size: 0.95rem;
            color: var(--gray);
            margin-bottom: 3rem;
        }

        .indicators {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .card-header {
            background: linear-gradient(135deg, var(--navy) 0%, #0F1C3F 100%);
            color: white;
            padding: 1.5rem;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .card-number {
            font-size: 2.5rem;
            font-weight: 700;
            opacity: 0.3;
            min-width: 60px;
        }

        .card-title {
            flex: 1;
        }

        .card-title h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .card-title p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .card-toggle {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .card.active .card-toggle { transform: rotate(180deg); }

        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            border-top: 2px solid var(--gold);
        }

        .card.active .card-body {
            max-height: 2000px;
        }

        .card-content {
            padding: 2rem 1.5rem;
        }

        .mechanism {
            background: var(--light);
            border-left: 3px solid var(--teal);
            padding: 1.2rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .mechanism strong { color: var(--navy); }

        .products-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            background: var(--gold);
            color: white;
            border-radius: 20px;
            padding: 0.2rem 0.6rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .products {
            list-style: none;
        }

        .product {
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            transition: all 0.2s ease;
        }

        .product:hover {
            background: var(--light);
            border-color: var(--teal);
        }

        .product-name {
            font-weight: 600;
            color: var(--navy);
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .product-mechanism {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 0.5rem;
            line-height: 1.5;

            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;

            background: linear-gradient(135deg, var(--navy) 0%, #0F1C3F 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 4rem;
        }

            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .cta p {
            font-size: 1rem;
            opacity: 0.95;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-btn {
            display: inline-block;
            background: var(--gold);
            color: var(--navy);
            padding: 1rem 2.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 24px rgba(201, 150, 12, 0.3);
        }

        footer {
            background: var(--light);
            padding: 2rem;
            text-align: center;
            color: var(--gray);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2rem; }
            .section-title { font-size: 1.5rem; }
            .indicators { grid-template-columns: 1fr; }
            .formula-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

            <div class="product-mechanism">${p.mech}</div>
            <div class="product-price">${p.price}</div>
            <a href="https://myship.7-11.com.tw/general/detail/GM2407210007294" class="buy-btn" target="_blank">查看購買 →</a>
        </li>
    `).join('');

    card.innerHTML = `
        <div class="card-header" onclick="this.parentElement.classList.toggle('active')">
            <div class="card-number">${ind.num}</div>
            <div class="card-title">
                <h3>${ind.title}</h3>
                <p>${ind.subtitle}</p>
            </div>
            <div class="card-toggle">⌄</div>
        </div>
        <div class="card-body">
            <div class="card-content">
                <div class="mechanism"><strong>機制原理：</strong>${ind.mechanism}</div>
                <div class="products-title">推薦產品 <span class="badge">${ind.products.length}</span></div>
                <ul class="products">${prodHTML}</ul>
            </div>
        </div>
    `;

    container.appendChild(card);
});
    </script>

</body>
</html>
