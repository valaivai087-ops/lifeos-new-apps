function initTabs() {
    const tabs = document.getElementById('tabs');
    Object.keys(data).forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.textContent = key;
        btn.onclick = () => switchTab(key);
        if (key === Object.keys(data)[0]) btn.classList.add('active');
        tabs.appendChild(btn);
    });
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderContent(tab);
}

function renderContent(tab) {
    const content = document.getElementById('content');
    content.innerHTML = '';
    
    data[tab].forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        
        let bodyHTML = '';
        
        if (item.examples) {
            bodyHTML += '<div style="margin-bottom: 15px;">';
            item.examples.forEach(ex => {
                bodyHTML += `<div class="bilingual">
                    <div class="lang-box cn">
                        <div class="lang-label">低維</div>
                        <div class="lang-content">${ex.cn}</div>
                    </div>
                    <div class="lang-box">
                        <div class="lang-label">Low Dim</div>
                        <div class="lang-content">${ex.en}</div>
                    </div>
                </div>
                <div class="arrow">↓</div>
                <div class="bilingual">
                    <div class="lang-box cn">
                        <div class="lang-label">高維</div>
                        <div class="lang-content">${ex.high_cn}</div>
                    </div>
                    <div class="lang-box">
                        <div class="lang-label">High Dim</div>
                        <div class="lang-content">${ex.high_en}</div>
                        <button class="tts-btn" onclick="speak('${ex.high_en.replace(/'/g, "\\'")}')">🔊 Speak</button>
                    </div>
                </div>`;
            });
            bodyHTML += '</div>';
        } else if (item.high_cn) {
            bodyHTML = `<div class="bilingual">
                <div class="lang-box cn">
                    <div class="lang-label">低維 Low Dim</div>
                    <div class="lang-content">${item.cn}</div>
                </div>
                <div class="lang-box">
                    <div class="lang-content">${item.en}</div>
                </div>
            </div>
            <div class="arrow">↓</div>
            <div class="bilingual">
                <div class="lang-box cn">
                    <div class="lang-label">高維 High Dim</div>
                    <div class="lang-content">${item.high_cn}</div>
                </div>
                <div class="lang-box">
                    <div class="lang-content">${item.high_en}</div>
                    <button class="tts-btn" onclick="speak('${item.high_en.replace(/'/g, "\\'")}')">🔊 Speak</button>
                </div>
            </div>`;
        } else if (item.checklist) {
            bodyHTML = `<ul style="margin-left: 20px;">
                ${item.checklist.map(c => `<li style="margin: 8px 0;">${c}</li>`).join('')}
            </ul>`;
        } else if (item.formula) {
            bodyHTML = `<div class="formula">${item.formula}</div>
            <div style="margin-top: 15px;">
                ${item.levels.map(l => `<div class="ability">${l}</div>`).join('')}
            </div>`;
        }
        
        card.innerHTML = `
            <div class="card-header" onclick="toggleCard(this)">
                <h3>${item.title}</h3>
                <span class="card-toggle">▼</span>
            </div>
            <div class="card-body">${bodyHTML}</div>
        `;
        content.appendChild(card);
    });
}

function toggleCard(header) {
    header.parentElement.classList.toggle('expanded');
}

function speak(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.9;
    speechSynthesis.speak(utterance);
}

function searchContent() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    if (!query) {
        renderContent(Object.keys(data)[0]);
        return;
    }
    
    const content = document.getElementById('content');
    content.innerHTML = '';
    let found = 0;
    
    Object.keys(data).forEach(tab => {
        data[tab].forEach(item => {
            const matchTitle = item.title.toLowerCase().includes(query);
            const matchCN = item.cn && item.cn.toLowerCase().includes(query);
            const matchEN = item.en && item.en.toLowerCase().includes(query);
            const matchHighCN = item.high_cn && item.high_cn.toLowerCase().includes(query);
            const matchHighEN = item.high_en && item.high_en.toLowerCase().includes(query);
            
            if (matchTitle || matchCN || matchEN || matchHighCN || matchHighEN) {
                found++;
                const card = document.createElement('div');
                card.className = 'card expanded';
                
                let bodyHTML = '';
                if (item.high_cn) {
                    bodyHTML = `<div class="bilingual">
                        <div class="lang-box cn">
                            <div class="lang-label">低維</div>
                            <div class="lang-content">${item.cn}</div>
                        </div>
                        <div class="lang-box">
                            <div class="lang-label">Low Dim</div>
                            <div class="lang-content">${item.en}</div>
                        </div>
                    </div>
                    <div class="arrow">↓</div>
                    <div class="bilingual">
                        <div class="lang-box cn">
                            <div class="lang-label">高維</div>
                            <div class="lang-content">${item.high_cn}</div>
                        </div>
                        <div class="lang-box">
                            <div class="lang-content">${item.high_en}</div>
                            <button class="tts-btn" onclick="speak('${item.high_en.replace(/'/g, "\\'")}')">🔊 Speak</button>
                        </div>
                    </div>`;
                }
                
                card.innerHTML = `
                    <div class="card-header">
                        <h3>${item.title} <span style="color: #c9960c;">[${tab}]</span></h3>
                    </div>
                    <div class="card-body">${bodyHTML}</div>
                `;
                content.appendChild(card);
            }
        });
    });
    
    if (found === 0) {
        content.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">找不到相關結果</div>';
    }
}

document.addEventListener('DOMContentLoaded', () => {
    initTabs();
    renderContent(Object.keys(data)[0]);
});
