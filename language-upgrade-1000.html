        const volInfo = [
            {num:1, title:'情感升維基礎 + 通用升維', range:'001-100'},
            {num:2, title:'情緒升維', range:'101-200'},
            {num:3, title:'思維升維', range:'201-300'},
            {num:4, title:'能力升維', range:'301-400'},
            {num:5, title:'學習升維', range:'401-500'},
            {num:6, title:'健康升維', range:'501-600'},
            {num:7, title:'關係升維', range:'601-700'},
            {num:8, title:'財富升維', range:'701-800'},
            {num:9, title:'人生升維', range:'801-900'},
            {num:10, title:'AI升維 × 系統升維', range:'901-1000'},
        ];

        function switchView(view){
            document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
            document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById(view+'View').classList.add('active');
            event.target.classList.add('active');
            if(view==='detail'){renderDetail();document.getElementById('volumeTabs').style.display='flex';document.querySelector('.search-box').style.display='flex'}
            else{document.getElementById('volumeTabs').style.display='none'}
        }

        function renderHome(){
            const html=volInfo.map(v=>`<div class="vol-card" onclick="switchViewAndVol('detail',${v.num})"><h3>Vol ${v.num}</h3><p>${v.title}</p><div class="preview">${allSentences.filter(s=>s.v===v.num).slice(0,3).map(s=>s.c).join(' ')}</div></div>`).join('');
            document.getElementById('homeContent').innerHTML=`<div style="margin-bottom:2rem"><h2 style="text-align:center;color:var(--navy);margin-bottom:1rem">📚 10大升維主題</h2><div class="home-grid">${html}</div></div>`;
            
            const grouped={};allSentences.forEach(s=>{if(!grouped[s.c])grouped[s.c]=s});
            const unique=Object.values(grouped).sort((a,b)=>a.n-b.n);
            const grid=`<div style="margin-bottom:2rem"><h2 style="text-align:center;color:var(--navy);margin-bottom:1rem">💫 所有中文句子 (${unique.length}句) - 一鍵查看 升維語言全景</h2><div class="chinese-grid">${unique.map(s=>`<div class="chinese-item" onclick="switchViewAndVol('detail',${s.v})"><div class="chinese-num">${String(s.n).padStart(3,'0')}</div><div class="chinese-text">${s.c}</div></div>`).join('')}</div></div>`;
            document.getElementById('homeContent').innerHTML+=grid;
        }

        function switchViewAndVol(v,vol){switchView(v);setTimeout(()=>switchVolume(vol),100)}

        function initVolumeTabs(){
            const html=volInfo.map(v=>`<button class="volume-tab ${v.num===1?'active':''}" onclick="switchVolume(${v.num})">Vol ${v.num}</button>`).join('');
            document.getElementById('volumeTabs').innerHTML=html;
        }

        let currentVol=1;
        function switchVolume(v){currentVol=v;document.querySelectorAll('.volume-tab').forEach((b,i)=>b.classList.toggle('active',i+1===v));document.getElementById('searchInput').value='';renderDetail()}

        function renderDetail(){
            const vol=volInfo[currentVol-1];
            const container=document.getElementById('detailContent');
            container.innerHTML=`<div class="volume-title">Vol ${currentVol}: ${vol.title}</div>`;
            
            const search=document.getElementById('searchInput').value.toLowerCase();
            let items=allSentences.filter(s=>s.v===currentVol);
            if(search)items=items.filter(s=>s.c.toLowerCase().includes(search)||s.e.toLowerCase().includes(search));
            
            if(items.length===0){container.innerHTML+='<div class="no-results">未找到相關句子</div>';return}
            
            const grouped={};
            items.forEach(s=>{if(!grouped[s.n])grouped[s.n]=[];grouped[s.n].push(s)});
            
            Object.keys(grouped).forEach(num=>{
                const group=grouped[num];
                const card=document.createElement('div');
                card.className='sentence-card';
                card.innerHTML=`
                    <div class="sentence-num">${String(num).padStart(3,'0')}</div>
                    <div class="sentence-chinese">${group.map(s=>s.c).join('\\n')}</div>
                    <div class="sentence-english">${group.map(s=>s.e).join('\\n')}</div>
                    <div class="divider"></div>
                    <button class="tts-btn" onclick="speakText('${group.map(s=>s.e).join('. ')}')">🔊 Speak</button>
                `;
                container.appendChild(card);
            });
        }

        function speakText(text){
            if('speechSynthesis' in window){
                window.speechSynthesis.cancel();
                const u=new SpeechSynthesisUtterance(text);
                u.lang='en-US';u.rate=0.9;
                window.speechSynthesis.speak(u);
            }
        }

        document.getElementById('searchInput').addEventListener('input',()=>renderDetail());
        initVolumeTabs();
        renderHome();
    </script>
