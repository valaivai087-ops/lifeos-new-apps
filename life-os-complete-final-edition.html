        title: "2️⃣ 新約七層架構詳細版",
        items: [
            { title: "Lv.1 身份層", cn: "定義：我是誰？根據耶穌宣告重新認識自己。我是被愛的、被接納的、有價值的、被選中的。\n身份來自創造者，不來自成就。每日宣告：我是神的兒女，承受天國產業。\n實踐：認識真實身份，拒絕謊言定義，建立確定身份。", en: "Who Am I? Identity based on Jesus' declaration, not on achievements or others' opinions." },
            { title: "Lv.2 思維層", cn: "定義：我如何思考？天國價值觀的重塑。從自我中心到他人中心，從短視到遠景，從恐懼到信心。\n聖經真理成為思維框架。每日思考：神如何看待這事？我應該如何思想？\n實踐：更新思念，破除謊言思維，建立真理思維。", en: "How Do I Think? Renewing mind with kingdom values, biblical truth as framework." },
            { title: "Lv.3 行動層", cn: "定義：我如何做？立刻行動的勇氣。不完美也開始，做中學習，信心配合行為。克服完美主義和拖延。\n每日行動：無論多小都開始，邁出信心第一步。\n實踐：克服恐懼，採取行動，建立習慣。", en: "How Do I Act? Taking immediate action despite imperfection, faith paired with works." },
            { title: "Lv.4 關係層", cn: "定義：我如何連結？愛與同理心。連結人心，建立橋樑，邊界擴展。他人中心視角，真實連結，深度陪伴。\n每日連結：誰需要我？我能給予什麼？\n實踐：建立真實關係，突破孤立，擴展連結。", en: "How Do I Connect? Love and empathy building bridges, expanding relational boundaries." },
            { title: "Lv.5 擴散層", cn: "定義：我如何擴散？聖靈力量倍增。細胞式增長，領導力複製，指數級擴張。個人的改變影響他人。\n每日擴散：我如何影響他人？我能帶領誰？\n實踐：培養他人，複製領導力，指數增長。", en: "How Do I Scale? Holy Spirit multiplication, leadership replication, exponential growth." },
            { title: "Lv.6 校準層", cn: "定義：我如何校正？持續優化改進。回饋系統，自我反思，高速後的調整。從實踐中學習，不斷進化。\n每日校準：我做得對嗎？如何更好？\n實踐：收集反饋，反思進步，持續優化。", en: "How Do I Calibrate? Continuous optimization through feedback, reflection, course correction." },
            { title: "Lv.7 收斂層", cn: "定義：我成為什麼？永恆的身份。基督的品格，天堂的預嚐，最終形象。從暫時到永恆，從人到聖者。\n每日盼望：我正成為什麼？永恆呼召是什麼？\n實踐：預嚐永恆，活出永恆視角，完成天命。", en: "What Do I Become? Eternal identity, Christ-like character, ultimate purpose and destiny." }
        ]
    },
    3: {
        title: "3️⃣ 十大錯誤模型完全版",
        items: [
            { title: "1.控制模型", cn: "試圖控制一切結果。根源：對失去控制的恐懼。表現：完美主義、微觀管理、信任缺失。代價：疲憊、焦慮、關係破裂。解藥：交託於神，相信神的計劃。", en: "Trying to control all outcomes. Root: fear of losing control. Cost: exhaustion, anxiety, broken relationships. Cure: surrender to God's plan." },
            { title: "2.自我中心", cn: "萬物以我為中心。根源：內心空虛感。表現：自私、操縱、關係失敗。代價：孤立、失去同盟。解藥：他人中心視角。", en: "Everything revolves around me. Root: inner emptiness. Cost: isolation, lost alliances. Cure: others-centered perspective." },
            { title: "3.恐懼模型", cn: "恐懼驅動決策。根源：缺乏安全感。表現：躲避、逃避、不冒風險。代價：停滯、錯失機遇。解藥：信心成長。", en: "Fear drives decisions. Root: lack of security. Cost: stagnation, missed opportunities. Cure: faith growth." },
            { title: "4.依附模型", cn: "過度依賴他人。根源：自我懷疑。表現：喪失自主、無法決策。代價：無力感。解藥：獨立成長。", en: "Over-dependence on others. Root: self-doubt. Cost: helplessness. Cure: independence growth." },
            { title: "5.短視模型", cn: "看不到長期影響。根源：及時滿足渴望。表現：短期決策、後悔。代價：錯失未來。解藥：遠景規劃。", en: "Inability to see long-term consequences. Root: immediate gratification. Cost: future loss. Cure: visionary planning." },
            { title: "6.自我欺騙", cn: "欺騙自己現實。根源：否認痛苦。表現：自欺欺人、錯誤決策。代價：問題惡化。解藥：誠實面對。", en: "Deceiving self about reality. Root: pain denial. Cost: problem escalation. Cure: honest facing." },
            { title: "7.單點依賴", cn: "依賴單一事物。根源：風險無知。表現：全盤崩潰。代價：脆弱無力。解藥：多元分散。", en: "Depending on single point. Root: risk ignorance. Cost: total collapse. Cure: diversification." },
            { title: "8.群體混亂", cn: "跟風盲從。根源：缺乏判斷。表現：集體失誤。代價：群體失敗。解藥：獨立思考。", en: "Blindly following crowd. Root: lack of judgment. Cost: collective failure. Cure: independent thinking." },
            { title: "9.律法回流", cn: "倒退到律法。根源：恩典不安。表現：又受轄制。代價：屬靈退步。解藥：恩典確定。", en: "Reverting to law. Root: grace discomfort. Cost: spiritual regression. Cure: grace certainty." },
            { title: "10.錯系統依附", cn: "依附虛假系統。根源：辨別不力。表現：虛空失落。代價：靈性混亂。解藥：回歸真理。", en: "Attachment to false system. Root: poor discernment. Cost: spiritual confusion. Cure: return to truth." }
        ]
    },
    4: {
        title: "4️⃣ 五大生命語法完全版",
        items: [
            { title: "1.身份語法 『我是...』", cn: "定義自己的話。基於真理。永恆不變。例：我是被愛的、我有價值、我能夠、我是自由的、我被創造為偉大的。特點：陈述式、肯定式、真理式。力量：定義身份、拒絕謊言、建立確定。", en: "Defining yourself. Based on truth. Eternal and unchanging. Examples: I am loved, I have worth, I am able, I am free." },
            { title: "2.關係語法 『我和你...』", cn: "連結人的話。表達愛。建立橋樑。例：我和你同行、我為你代禱、我相信你、我擁抱你、我愛你。特點：連接式、表達式、互動式。力量：建立連結、表達情感、深化關係。", en: "Connecting with others. Express love. Build bridges. Examples: I walk with you, I pray for you, I believe in you." },
            { title: "3.事件語法 『這意味著...』", cn: "詮釋現實的話。尋找意義。建立因果。例：失敗意味著成長、試煉意味著信心、痛苦意味著轉化、困難意味著機會。特點：解釋式、連結式、轉化式。力量：重新詮釋、找到意義、轉化思想。", en: "Interpreting reality. Find meaning. Build causality. Examples: Failure means growth, trials mean faith, pain means transformation." },
            { title: "4.行動語法 『當...時，...』", cn: "導引行為的話。創造習慣。建立系統。例：當困難時，我信靠、當失敗時，我重新開始、當孤獨時，我連結、當害怕時，我勇敢。特點：條件式、反應式、習慣式。力量：創造習慣、自動反應、建立系統。", en: "Guiding behavior. Create habits. Build systems. Examples: When difficult, I trust; When I fail, I restart; When afraid, I'm brave." },
            { title: "5.更新語法 『我正在成為...』", cn: "宣告未來的話。進行式成長。每日轉化。例：我正在變勇敢、我正在治癒、我正在領導、我正在愛、我正在變成最好的自己。特點：進行式、宣告式、進展式。力量：宣告未來、激發成長、每日進步。", en: "Declaring future. Ongoing growth. Daily transformation. Examples: I'm becoming brave, healing, a leader, loving, my best self." }
        ]
    },

    6: {
        title: "6️⃣ 36項控告模型完全版",
        items: [
            { title: "身份控告(12項)", cn: "1.你不夠好 2.你很失敗 3.你不被愛 4.你很醜 5.你很愚蠢 6.你沒能力 7.你應死 8.你不值得 9.你很邪惡 10.你很污穢 11.你很可恥 12.你無可救藥\n\n每項控告的根源：自我評估、失敗經歷、被拒經驗、外在評判、知識差距、能力質疑、該死定罪、價值否定、過犯指控、內心污染、羞恥感、絕望感。\n\n神的回應：你被創造為好的 | 你的失敗不定義你 | 你被深深愛著 | 你在我眼中美麗 | 你有真智慧 | 你有能力 | 你值得活著 | 你無比珍貴 | 你被救贖了 | 你被潔淨了 | 你被接納了 | 救恩永遠可能", en: "12 Identity accusations and God's truth responses" },
            { title: "行為控告(12項)", cn: "1.你說謊 2.你偷竊 3.你背叛 4.你傷害人 5.你控制 6.你操縱 7.你懶惰 8.你自私 9.你裝假 10.你怯弱 11.你不忠 12.你無能\n\n每項控告的根源：說謊習慣、貪心衝動、背信行為、傷人言語、權力渴望、欺騙手段、不願努力、以我為中心、虛偽面具、恐懼退縮、背棄承諾、無法完成。\n\n神的回應：你被改變了 | 你被滿足了 | 你被信任了 | 你被醫治了 | 你被賦予力量 | 你被光照了 | 你被激勵了 | 你被更新了 | 你被接納了 | 你被鼓勵了 | 你被堅固了 | 你被賦能了", en: "12 Behavioral accusations and God's truth responses" },
            { title: "結果控告(12項)", cn: "1.你終將失敗 2.你會孤獨 3.你被拋棄 4.你會痛苦 5.你失去一切 6.你會毀滅 7.永遠不夠 8.你被詛咒 9.無法改變 10.你死定了 11.下地獄 12.永遠被拒\n\n每項控告的根源：失敗預測、孤立恐懼、拋棄創傷、痛苦預期、失喪恐懼、毀滅想象、不足感、咒詛信念、改變不可能、死亡威脅、地獄恐懼、永遠拒絕。\n\n神的回應：你會得勝 | 你永不孤獨 | 我永不拋棄你 | 我與你同在 | 我保護你的生命 | 我保護你的靈魂 | 你對我足夠 | 你被祝福 | 改變已開始 | 你永遠活著 | 天堂為你準備 | 你永遠被接納", en: "12 Outcome accusations and God's truth responses" }
        ]
    },
    7: {
        title: "7️⃣ 神的話最高語法 - 新舊約對比完全版",
        items: [
            { title: "身份維度", cn: "新約：『在基督裡』的身份 - 神的兒女，被收養，永遠的承嗣。基於耶穌的救贖，與神和好，享受完全的接納。\n舊約：『神的選民』身份 - 出埃及的民族，分別為聖的人，蒙揀選的族類。基於族群和律法守護。\n對比：從民族身份到個人身份 | 從條件身份到永遠身份 | 從外在標記到內心更新 | 從做什麼到是什麼", en: "Identity: New Testament 'in Christ' vs Old Testament 'God's chosen people'" },
            { title: "關係維度", cn: "新約：『父子關係』 - 親密的、個人的、愛的關係。耶穌稱神為『父親』，邀請我們同樣稱呼。無條件的愛，完全的信任，深度的溝通。\n舊約：『西奈之約』 - 正式的、條約式的、律法的關係。神與以色列民立約，給予十誡，要求順服。條件式的祝福，審判的威嚇，距離的敬畏。\n對比：從契約到親情 | 從距離到親密 | 從懼怕到信任 | 從條件到無條件", en: "Relationship: New Testament 'Father-child' vs Old Testament 'Covenant relationship'" },
            { title: "認知維度", cn: "新約：『聖靈啟蒙』 - 聖靈內住，光照真理，引導所有事。直接的指引，個人的領受，動態的智慧。『聖靈將要引導你進入一切真理』。\n舊約：『遵守律法』 - 律法是智慧，律法是光，律法是路標。外在的規範，客觀的標準，靜態的要求。『律法是客人的光』。\n對比：從外在律法到內在聖靈 | 從死的字句到活的靈 | 從遵守規則到被聖靈引導 | 從知識到智慧", en: "Cognition: New Testament 'Holy Spirit enlightenment' vs Old Testament 'Law observance'" },
            { title: "行動維度", cn: "新約：『愛與服侍』 - 愛神愛人是最高誡命，服侍源於愛，行為源於感恩，動機是內在的。『你們要彼此相愛』。\n舊約：『十誡系統』 - 十誡詳細規定行為標準，禁止和命令，外在的規約，遵守是義務。『聽命勝於獻祭』。\n對比：從外在義務到內在驅動 | 從被動遵守到主動事奉 | 從規則導向到愛導向 | 從做對到變對", en: "Action: New Testament 'Love and service' vs Old Testament 'Law system'" },
            { title: "未來維度", cn: "新約：『永恆盼望』 - 天國已經開始，還未完全，天堂為信徒預備。復活的盼望，永恆的生命，與神同住。『我去為你們預備地方』。\n舊約：『應許之地』 - 應許地是最高應許，完全的產業，最終的安息。進入應許地代表進入祝福，但仍是時間和空間的應許。\n對比：從地土應許到永恆應許 | 從看得見的應許到看不見的應許 | 從今生福分到來世榮耀 | 從物質到屬靈", en: "Future: New Testament 'Eternal hope' vs Old Testament 'Promised land'" }
        ]
    },
    8: {
        title: "8️⃣ 聖靈七級轉化完全版",
        items: [
            { title: "Lv.1 羞恥→慈悲", cn: "誤區語法：『我很可恥，我應該躲藏』。神經機制：大腦的防衛反應被激活。轉化語法：『我被接納，我可以看見他人』。營養支持：需要無條件接納和見證。身體策略：深呼吸、肌肉放鬆、重新連結身體。更新策略：與安全的人分享、逐漸敞開、經歷被接納的體驗。", en: "Level 1: Shame to Compassion - From hiding to seeing others in their struggle." },
            { title: "Lv.2 悲傷→喜樂", cn: "誤區語法：『痛苦是永遠的，我無法快樂』。神經機制：多巴胺系統被抑制。轉化語法：『我被安慰，我可以找到喜樂』。營養支持：需要陪伴和盼望的信息。身體策略：運動、陽光、與人連結。更新策略：允許悲傷、在悲傷中找到意義、漸進地恢復喜樂。", en: "Level 2: Sorrow to Joy - From grief to hope and celebration." },
            { title: "Lv.3 勞苦→盼望", cn: "誤區語法：『我疲憊了，無法堅持』。神經機制：糖皮質激素水平過高。轉化語法：『我被賦予力量，我可以堅持』。營養支持：需要休息和目標提醒。身體策略：充分睡眠、營養飲食、定期休息。更新策略：回顧已有的進步、看見長期目標、調整節奏。", en: "Level 3: Toil to Hope - From exhaustion to renewed purpose." },
            { title: "Lv.4 上癮→平安", cn: "誤區語法：『我需要這個來感受好』。神經機制：獎賞系統被操縱。轉化語法：『我被滿足，我不需要上癮』。營養支持：需要健康的替代品和支持群體。身體策略：運動、冷水淋浴、新的習慣建立。更新策略：識別真實需求、找到健康滿足、建立新習慣。", en: "Level 4: Addiction to Peace - From dependence to freedom and satisfaction." },
            { title: "Lv.5 焦慮→勇氣", cn: "誤區語法：『可怕的事會發生，我無法應對』。神經機制：杏仁核過度反應。轉化語法：『我被保護，我可以勇敢』。營養支持：需要安全和成功的體驗。身體策略：呼吸練習、冥想、逐步面對恐懼。更新策略：挑戰災難化思維、小步驟面對恐懼、慶祝勇敢行為。", en: "Level 5: Anxiety to Courage - From fear to confident action." },
            { title: "Lv.6 恐懼→平安", cn: "誤區語法：『危險無處不在，我無法放鬆』。神經機制：背外側前額葉皮層功能下降。轉化語法：『我很安全，我可以信任』。營養支持：需要安全環境和重複的安全體驗。身體策略：接地技巧、感官調節、漸進式肌肉放鬆。更新策略：建立安全環境、積累安全記憶、逐漸擴展信任。", en: "Level 6: Fear to Peace - From survival mode to rest and trust." },
            { title: "Lv.7 死亡→永生", cn: "誤區語法：『一切都會結束，無意義』。神經機制：前額葉皮層的存在死亡思想。轉化語法：『我永遠活著，有永恆意義』。營養支持：需要更大的目標和屬靈連結。身體策略：宇宙連結、靈性實踐、超越自我的服侍。更新策略：擁抱永恆視角、尋找生命意義、為永恆而活。", en: "Level 7: Death to Eternal Life - From futility to eternal purpose." }
        ]
    },
    9: {

let currentSection = 0;

function switchSection(n) {
    currentSection = n;
    document.querySelectorAll('.nav-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === n);
    });
    renderContent();
}

function renderContent() {
    const section = data[currentSection];
    let html = `<h2 style="color:#1A2B5F;font-size:12px;margin-bottom:8px;border-bottom:2px solid #C9960C;padding-bottom:4px;">${section.title}</h2>`;
    section.items.forEach(item => {
        html += `<div class="item">
            <div class="title">${item.title}</div>
            <div class="cn">${item.cn}</div>
            ${item.en ? `<div class="en">${item.en}</div>` : ''}
            <button class="tts" onclick="speak('${item.title} ${(item.cn || '').substring(0, 60)}')">🔊</button>
        </div>`;
    });
    document.getElementById('content').innerHTML = html;
}

function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.85;
        window.speechSynthesis.speak(u);
    }
}

renderContent();
    </script>
